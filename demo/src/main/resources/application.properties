# =========================
# SERVER
# =========================
server.address=0.0.0.0
server.port=8080

# =========================
# MONGODB
# =========================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=Medicine-tracker
spring.data.mongodb.auto-index-creation=false

# =========================
# GOOGLE OAUTH2
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=https://enchanting-curiosity-production.up.railway.app/login/oauth2/code/google

# =========================
# JWT
# =========================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# =========================
# FRONTEND
# =========================
app.frontend-url=https://medicine-tracker-web-sarthakgupta023s-projects.vercel.app

# =========================
# LOGGING
# =========================
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=INFO