# =========================
# SERVER
# =========================
server.address=0.0.0.0
server.port=8080

# =========================
# MONGODB
# =========================
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=Medicine-tracker
spring.data.mongodb.auto-index-creation=false

# =========================
# GOOGLE OAUTH2
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# =========================
# JWT
# =========================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# =========================
# FRONTEND
# =========================
app.frontend-url=${FRONTEND_URL:https://medicine-tracker-web-sarthakgupta023s-projects.vercel.app}

# =========================
# LOGGING
# =========================
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# =========================
# ADDITIONAL SECURITY SETTINGS
# =========================
server.servlet.session.timeout=30m
spring.security.filter.order=5